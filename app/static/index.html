<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfinitePay Assistant</title>

  <!-- Marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <style>
    /* ------------------------------------------------------------------ */
    /* Reset & Base                                                         */
    /* ------------------------------------------------------------------ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #00c853;
      --green-dark:  #009624;
      --green-light: #5efc82;
      --bg-page:     #0b0e17;
      --bg-card:     #141722;
      --bg-input:    #1c2030;
      --bg-user-msg: #1a3a2a;
      --bg-bot-msg:  #1c2030;
      --border:      #252a3a;
      --text-primary: #e8eaf0;
      --text-secondary: #8b92a8;
      --text-muted:   #555c72;
      --radius:       14px;
      --radius-sm:    8px;
      --shadow:       0 4px 24px rgba(0,0,0,0.4);

      /* Agent badge colors */
      --knowledge-bg:   #0d2a4a;
      --knowledge-text: #4db6ff;
      --support-bg:     #3a2000;
      --support-text:   #ffaa33;
      --escalation-bg:  #3a0a0a;
      --escalation-text:#ff5555;
      --guardrails-bg:  #1e1e2a;
      --guardrails-text:#8888bb;
    }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-page);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* ------------------------------------------------------------------ */
    /* Layout                                                               */
    /* ------------------------------------------------------------------ */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }

    /* ------------------------------------------------------------------ */
    /* Header                                                               */
    /* ------------------------------------------------------------------ */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--green);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 900;
      color: #000;
      letter-spacing: -1px;
      flex-shrink: 0;
    }

    .header-title h1 {
      font-size: 16px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1.2;
    }

    .header-title p {
      font-size: 12px;
      color: var(--text-secondary);
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-secondary);
      padding: 6px 12px;
      background: var(--bg-input);
      border-radius: 20px;
      border: 1px solid var(--border);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
      transition: background 0.3s;
    }

    .status-dot.online { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-dot.error  { background: #ff5555; }

    /* ------------------------------------------------------------------ */
    /* Messages area                                                        */
    /* ------------------------------------------------------------------ */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ------------------------------------------------------------------ */
    /* Message bubbles                                                      */
    /* ------------------------------------------------------------------ */
    .message-row {
      display: flex;
      gap: 10px;
      max-width: 80%;
    }

    .message-row.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message-row.bot {
      align-self: flex-start;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .avatar.bot-avatar  { background: var(--green); color: #000; font-weight: 900; }
    .avatar.user-avatar { background: #252a3a; color: var(--text-secondary); }

    .bubble-wrapper {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.6;
      word-wrap: break-word;
      position: relative;
    }

    .message-row.user .bubble {
      background: var(--bg-user-msg);
      border: 1px solid rgba(0,200,83,0.25);
      border-bottom-right-radius: 4px;
      color: var(--text-primary);
    }

    .message-row.bot .bubble {
      background: var(--bg-bot-msg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Markdown styles inside bot bubbles */
    .bubble h1, .bubble h2, .bubble h3 {
      color: var(--text-primary);
      margin: 12px 0 6px;
      font-size: 14px;
    }

    .bubble p { margin: 6px 0; }

    .bubble strong { color: var(--green-light); }

    .bubble code {
      background: #0b0e17;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 12px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      color: var(--green-light);
    }

    .bubble pre {
      background: #0b0e17;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px;
      overflow-x: auto;
      margin: 8px 0;
    }

    .bubble pre code {
      background: none;
      padding: 0;
    }

    .bubble ul, .bubble ol {
      padding-left: 20px;
      margin: 6px 0;
    }

    .bubble li { margin: 3px 0; }

    .bubble a { color: var(--green); text-decoration: none; }
    .bubble a:hover { text-decoration: underline; }

    .bubble blockquote {
      border-left: 3px solid var(--green);
      padding-left: 12px;
      margin: 8px 0;
      color: var(--text-secondary);
      font-style: italic;
    }

    .bubble table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin: 8px 0;
    }

    .bubble th, .bubble td {
      padding: 6px 10px;
      border: 1px solid var(--border);
      text-align: left;
    }

    .bubble th {
      background: var(--bg-page);
      color: var(--green-light);
      font-weight: 600;
    }

    .bubble td { background: rgba(0,0,0,0.2); }

    /* ------------------------------------------------------------------ */
    /* Message footer (timestamp + badge)                                   */
    /* ------------------------------------------------------------------ */
    .message-footer {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .message-row.user .message-footer { justify-content: flex-end; }

    .msg-time {
      font-size: 11px;
      color: var(--text-muted);
    }

    .agent-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      white-space: nowrap;
    }

    .badge-knowledge  { background: var(--knowledge-bg);  color: var(--knowledge-text); }
    .badge-support    { background: var(--support-bg);    color: var(--support-text); }
    .badge-escalation { background: var(--escalation-bg); color: var(--escalation-text); }
    .badge-guardrails { background: var(--guardrails-bg); color: var(--guardrails-text); }

    /* ------------------------------------------------------------------ */
    /* Ticket card                                                          */
    /* ------------------------------------------------------------------ */
    .ticket-card {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
      padding: 10px 14px;
      background: rgba(255, 170, 51, 0.08);
      border: 1px solid rgba(255, 170, 51, 0.3);
      border-radius: var(--radius-sm);
      font-size: 12px;
      color: var(--support-text);
    }

    .ticket-card .ticket-icon { font-size: 16px; }
    .ticket-card code {
      background: rgba(255,170,51,0.15);
      color: var(--support-text);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }

    /* ------------------------------------------------------------------ */
    /* Typing indicator                                                     */
    /* ------------------------------------------------------------------ */
    .typing-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      align-self: flex-start;
    }

    .typing-bubble {
      background: var(--bg-bot-msg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      border-bottom-left-radius: 4px;
      padding: 14px 18px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ------------------------------------------------------------------ */
    /* Welcome message                                                      */
    /* ------------------------------------------------------------------ */
    .welcome-message {
      background: linear-gradient(135deg, rgba(0,200,83,0.08), rgba(0,200,83,0.02));
      border: 1px solid rgba(0,200,83,0.2);
      border-radius: var(--radius);
      padding: 20px 24px;
      text-align: center;
      align-self: center;
      max-width: 480px;
    }

    .welcome-message .welcome-icon { font-size: 32px; margin-bottom: 10px; }

    .welcome-message h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--green-light);
      margin-bottom: 8px;
    }

    .welcome-message p {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.6;
    }

    .quick-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 14px;
    }

    .quick-btn {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-secondary);
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: rgba(0,200,83,0.1);
      border-color: rgba(0,200,83,0.4);
      color: var(--green-light);
    }

    /* ------------------------------------------------------------------ */
    /* Input area                                                           */
    /* ------------------------------------------------------------------ */
    .input-area {
      padding: 16px 20px;
      background: var(--bg-card);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .input-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .user-selector-label {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .user-selector {
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 12px;
      padding: 6px 10px;
      cursor: pointer;
      outline: none;
      flex: 1;
      max-width: 220px;
      transition: border-color 0.2s;
    }

    .user-selector:focus { border-color: var(--green); }

    .user-selector option { background: var(--bg-card); }

    .input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .message-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      padding: 12px 16px;
      resize: none;
      min-height: 48px;
      max-height: 120px;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.5;
    }

    .message-input::placeholder { color: var(--text-muted); }

    .message-input:focus { border-color: var(--green); }

    .send-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--green);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      color: #000;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--green-light);
      transform: scale(1.05);
    }

    .send-btn:disabled { background: var(--text-muted); cursor: not-allowed; transform: none; }

    .send-btn svg { width: 20px; height: 20px; }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      text-align: center;
    }

    /* ------------------------------------------------------------------ */
    /* Responsive                                                           */
    /* ------------------------------------------------------------------ */
    @media (max-width: 600px) {
      .message-row { max-width: 92%; }
      header { padding: 12px 16px; }
      .messages { padding: 16px 12px; }
      .input-area { padding: 12px 16px; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Header -->
  <header>
    <div class="header-brand">
      <div class="logo">IP</div>
      <div class="header-title">
        <h1>InfinitePay Assistant</h1>
        <p>Assistente de Atendimento ao Cliente</p>
      </div>
    </div>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Verificando...</span>
    </div>
  </header>

  <!-- Messages -->
  <div class="messages" id="messages"></div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-controls">
      <span class="user-selector-label">👤 Usuário:</span>
      <select class="user-selector" id="userSelector">
        <option value="client789">client789 — Carlos Andrade (ativo)</option>
        <option value="user_002">user_002 — Maria Souza (suspensa / KYC pendente)</option>
        <option value="user_003">user_003 — João Silva (KYC pendente)</option>
        <option value="user_004">user_004 — Ana Lima (limite diário esgotado)</option>
        <option value="user_005">user_005 — Pedro Costa (2 logins falhos)</option>
        <option value="tg_demo">tg_demo — Usuário Telegram demo</option>
      </select>
    </div>
    <div class="input-row">
      <textarea
        class="message-input"
        id="messageInput"
        placeholder="Digite sua mensagem... (Enter para enviar, Shift+Enter para nova linha)"
        rows="1"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <p class="input-hint">Pode perguntar em português ou inglês</p>
  </div>

</div>

<script>
  // ------------------------------------------------------------------ //
  // Configuration                                                        //
  // ------------------------------------------------------------------ //
  const API_BASE = window.location.origin;

  // ------------------------------------------------------------------ //
  // Marked.js configuration                                              //
  // ------------------------------------------------------------------ //
  marked.setOptions({
    breaks: true,
    gfm: true,
  });

  // ------------------------------------------------------------------ //
  // DOM references                                                       //
  // ------------------------------------------------------------------ //
  const messagesEl   = document.getElementById('messages');
  const inputEl      = document.getElementById('messageInput');
  const sendBtn      = document.getElementById('sendBtn');
  const userSelector = document.getElementById('userSelector');
  const statusDot    = document.getElementById('statusDot');
  const statusText   = document.getElementById('statusText');

  let isLoading = false;

  // ------------------------------------------------------------------ //
  // Welcome card (rendered by JS so it survives user switches)          //
  // ------------------------------------------------------------------ //
  function renderWelcomeCard() {
    const card = document.createElement('div');
    card.className = 'welcome-message';
    card.id = 'welcomeCard';
    card.innerHTML = `
      <div class="welcome-icon">🤖</div>
      <h2>Bem-vindo ao InfinitePay Assistant!</h2>
      <p>
        Sou composto por 4 agentes especializados: <strong>Knowledge</strong> (RAG + busca web),
        <strong>Support</strong> (ferramentas de conta), <strong>Atendimento Humano</strong> e
        um <strong>Router</strong> que decide automaticamente quem responde.
      </p>
      <div class="quick-questions">
        <button class="quick-btn" onclick="sendQuick('Quais as taxas da Maquininha Smart?')">💳 Taxas Maquininha</button>
        <button class="quick-btn" onclick="sendQuick('Não consigo fazer transferências')">🔧 Problema de conta</button>
        <button class="quick-btn" onclick="sendQuick('Como funciona o Pix Parcelado?')">⚡ Pix Parcelado</button>
        <button class="quick-btn" onclick="sendQuick('Quero falar com um humano')">🤝 Falar com humano</button>
      </div>
    `;
    messagesEl.appendChild(card);
  }

  function removeWelcomeCard() {
    const card = document.getElementById('welcomeCard');
    if (card) card.remove();
  }

  // ------------------------------------------------------------------ //
  // Chat history — load from server on start and on user switch         //
  // ------------------------------------------------------------------ //
  async function loadHistory(userId) {
    messagesEl.innerHTML = '';
    try {
      const res = await fetch(`${API_BASE}/history/${encodeURIComponent(userId)}`);
      if (!res.ok) { renderWelcomeCard(); return; }
      const data = await res.json();
      if (!data.history || data.history.length === 0) { renderWelcomeCard(); return; }

      data.history.forEach(turn => {
        const ts = turn.timestamp
          ? new Date(turn.timestamp).toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' })
          : '';
        // User bubble
        const userRow = document.createElement('div');
        userRow.className = 'message-row user';
        userRow.innerHTML = `
          <div class="avatar user-avatar">👤</div>
          <div class="bubble-wrapper">
            <div class="bubble">${escapeHtml(turn.user)}</div>
            <div class="message-footer"><span class="msg-time">${ts}</span></div>
          </div>
        `;
        messagesEl.appendChild(userRow);
        // Bot bubble
        appendBotMessage({
          response:   turn.bot,
          agent_used: turn.agent_used,
          ticket_id:  turn.ticket_id,
          escalated:  turn.escalated,
          language:   turn.language,
        }, ts);
      });
    } catch (e) {
      renderWelcomeCard();
    }
  }

  // Load history for the initially selected user
  loadHistory(userSelector.value);

  // Reload history whenever the user switches
  userSelector.addEventListener('change', () => {
    loadHistory(userSelector.value);
  });

  // ------------------------------------------------------------------ //
  // Health check                                                         //
  // ------------------------------------------------------------------ //
  async function checkHealth() {
    try {
      const res = await fetch(`${API_BASE}/health`);
      if (res.ok) {
        const data = await res.json();
        statusDot.className = 'status-dot online';
        statusText.textContent = `Online • ${data.documents_indexed} docs indexados`;
      } else {
        setOffline();
      }
    } catch {
      setOffline();
    }
  }

  function setOffline() {
    statusDot.className = 'status-dot error';
    statusText.textContent = 'Servidor offline';
  }

  checkHealth();
  setInterval(checkHealth, 30000);

  // ------------------------------------------------------------------ //
  // Input handling                                                       //
  // ------------------------------------------------------------------ //
  inputEl.addEventListener('input', () => {
    sendBtn.disabled = inputEl.value.trim() === '' || isLoading;
    // Auto-resize textarea
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!sendBtn.disabled) sendMessage();
    }
  });

  // ------------------------------------------------------------------ //
  // Quick question buttons                                               //
  // ------------------------------------------------------------------ //
  function sendQuick(text) {
    inputEl.value = text;
    inputEl.dispatchEvent(new Event('input'));
    sendMessage();
  }

  // ------------------------------------------------------------------ //
  // Send message                                                         //
  // ------------------------------------------------------------------ //
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    const userId = userSelector.value;

    // Remove welcome card on first message
    removeWelcomeCard();

    // Render user bubble
    appendUserMessage(text);

    // Clear + reset input
    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    isLoading = true;

    // Show typing indicator
    const typingEl = appendTyping();

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, user_id: userId }),
      });

      const data = await res.json();

      typingEl.remove();

      if (res.ok) {
        appendBotMessage(data);
      } else {
        appendErrorMessage(data.detail || 'Erro desconhecido.');
      }

    } catch (err) {
      typingEl.remove();
      appendErrorMessage('Não foi possível conectar ao servidor. Verifique se ele está rodando.');
    }

    isLoading = false;
    sendBtn.disabled = inputEl.value.trim() === '';
    scrollBottom();
  }

  // ------------------------------------------------------------------ //
  // Message rendering                                                    //
  // ------------------------------------------------------------------ //
  function now() {
    return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  }

  function appendUserMessage(text) {
    const row = document.createElement('div');
    row.className = 'message-row user';
    row.innerHTML = `
      <div class="avatar user-avatar">👤</div>
      <div class="bubble-wrapper">
        <div class="bubble">${escapeHtml(text)}</div>
        <div class="message-footer">
          <span class="msg-time">${now()}</span>
        </div>
      </div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function appendBotMessage(data, timestamp) {
    const { response, agent_used, ticket_id, escalated, language } = data;
    const msgTime = timestamp || now();

    const badgeClass = agentBadgeClass(agent_used);
    const badgeLabel = agentBadgeLabel(agent_used);
    const langBadge  = language === 'pt' ? '🇧🇷 PT' : language === 'en' ? '🇺🇸 EN' : language;

    const ticketHtml = ticket_id ? `
      <div class="ticket-card">
        <span class="ticket-icon">🎫</span>
        <span>Ticket criado: <code>${ticket_id}</code></span>
      </div>
    ` : '';

    const escalatedHtml = escalated && agent_used !== 'escalation_agent' ? `
      <div class="ticket-card" style="border-color:rgba(255,85,85,0.3);background:rgba(255,85,85,0.06);color:#ff5555;">
        <span>⚠️</span>
        <span>Esta conversa foi encaminhada para nossa equipe humana</span>
      </div>
    ` : '';

    const row = document.createElement('div');
    row.className = 'message-row bot';
    row.innerHTML = `
      <div class="avatar bot-avatar">IP</div>
      <div class="bubble-wrapper">
        <div class="bubble">${marked.parse(response)}</div>
        ${ticketHtml}
        ${escalatedHtml}
        <div class="message-footer">
          <span class="msg-time">${msgTime}</span>
          <span class="agent-badge ${badgeClass}">${badgeLabel}</span>
          <span class="msg-time">${langBadge}</span>
        </div>
      </div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function appendErrorMessage(msg) {
    const row = document.createElement('div');
    row.className = 'message-row bot';
    row.innerHTML = `
      <div class="avatar bot-avatar">IP</div>
      <div class="bubble-wrapper">
        <div class="bubble" style="border-color:rgba(255,85,85,0.3);color:#ff8888;">
          ⚠️ ${escapeHtml(msg)}
        </div>
        <div class="message-footer">
          <span class="msg-time">${now()}</span>
        </div>
      </div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
  }

  function appendTyping() {
    const row = document.createElement('div');
    row.className = 'typing-row';
    row.innerHTML = `
      <div class="avatar bot-avatar">IP</div>
      <div class="typing-bubble">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    `;
    messagesEl.appendChild(row);
    scrollBottom();
    return row;
  }

  // ------------------------------------------------------------------ //
  // Agent badge helpers                                                  //
  // ------------------------------------------------------------------ //
  function agentBadgeClass(agent) {
    const map = {
      knowledge_agent:  'badge-knowledge',
      support_agent:    'badge-support',
      escalation_agent: 'badge-escalation',
      guardrails:       'badge-guardrails',
    };
    return map[agent] || 'badge-guardrails';
  }

  function agentBadgeLabel(agent) {
    const map = {
      knowledge_agent:  '🔍 Knowledge',
      support_agent:    '🛠️ Support',
      escalation_agent: '🚨 Atendimento Humano',
      guardrails:       '🛡️ Guardrails',
    };
    return map[agent] || agent;
  }

  // ------------------------------------------------------------------ //
  // Utilities                                                            //
  // ------------------------------------------------------------------ //
  function scrollBottom() {
    requestAnimationFrame(() => {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    });
  }

  function escapeHtml(text) {
    return text
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }
</script>

</body>
</html>
