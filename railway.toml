[build]
builder = "dockerfile"

[deploy]
# Railway runs startCommand directly (no shell), so ${PORT} expansion must
# happen via `sh -c`. Without this wrapper, uvicorn receives "${PORT:-8000}"
# as a literal string and crashes on startup.
startCommand = "sh -c 'uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}'"
healthcheckPath = "/health"
# Allow up to 5 minutes for the first start (embedding model warm-up + RAG check)
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
