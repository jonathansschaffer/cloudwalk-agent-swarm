[build]
builder = "dockerfile"

[deploy]
# Railway injects $PORT dynamically; falls back to 8000 for local Docker runs.
startCommand = "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
healthcheckPath = "/health"
# Allow up to 5 minutes for the first start (embedding model warm-up + RAG check)
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
